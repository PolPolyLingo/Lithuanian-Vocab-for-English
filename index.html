<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lithuanian Vocabulary List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background-color: #fff;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .controls-section {
            background-color: #f8f9fa;
            padding: 20px;
            border-bottom: 1px solid #dee2e6;
        }

        .filters {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 15px;
        }

        .filters label {
            font-weight: 600;
            color: #333;
        }

        .filters input,
        .filters select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 0.95em;
        }

        .filters button {
            padding: 8px 16px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.3s;
        }

        .filters button:hover {
            background-color: #764ba2;
        }

        .letter-navigation {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .letter-btn {
            padding: 8px 12px;
            background-color: #e9ecef;
            border: 2px solid transparent;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 0.9em;
        }

        .letter-btn:hover {
            background-color: #e2e6ea;
            border-color: #667eea;
        }

        .letter-btn.active {
            background-color: #667eea;
            color: white;
            border-color: #667eea;
        }

        .letter-section {
            display: none;
            padding: 30px;
        }

        .letter-section.active {
            display: block;
        }

        .letter-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e9ecef;
        }

        .letter-title {
            font-size: 3em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            min-width: 80px;
        }

        .vocabulary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .vocabulary-card {
            background: #fff;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            cursor: pointer;
        }

        .vocabulary-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            border-color: #667eea;
        }

        .card-image {
            width: 100%;
            height: 200px;
            background-color: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .vocabulary-card:hover .card-image img {
            transform: scale(1.05);
        }

        .card-image.no-image {
            font-size: 3em;
            color: #ddd;
        }

        .card-content {
            padding: 15px;
        }

        .word-lithuanian {
            font-size: 1.4em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 8px;
        }

        .word-type {
            font-size: 0.85em;
            color: #999;
            font-style: italic;
            margin-bottom: 10px;
        }

        .word-description {
            font-size: 0.9em;
            color: #555;
            line-height: 1.5;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }

        .tags {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .tag {
            display: inline-block;
            background-color: #e7f3ff;
            color: #667eea;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.8em;
            font-weight: 600;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state p {
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .word-count {
            font-size: 0.9em;
            color: #666;
            margin-left: auto;
            font-weight: 600;
        }

        footer {
            background-color: #f8f9fa;
            color: #666;
            text-align: center;
            padding: 20px;
            border-top: 1px solid #dee2e6;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            .vocabulary-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 15px;
            }

            header h1 {
                font-size: 1.8em;
            }

            .filters {
                flex-direction: column;
                align-items: stretch;
            }

            .filters input,
            .filters select,
            .filters button {
                width: 100%;
            }

            .letter-navigation {
                gap: 5px;
            }

            .letter-btn {
                padding: 6px 10px;
                font-size: 0.8em;
            }

            .letter-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .word-count {
                margin-left: 0;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🇱🇹 Lithuanian for 🇺🇸 English</h1>
            <p>Vocabulary List - Learn Lithuanian Words with Images</p>
        </header>

        <div class="controls-section">
            <div class="filters">
		<label for="categoryFilter">Category:</label>
                <select id="categoryFilter">
                    <option value="">All Categories</option>
                    <option value="Agriculture">Agriculture</option>
                    <option value="Communications">Communications</option>
                    <option value="Computers">Computers</option>
					<option value="Descriptive">Descriptive</option>
                    <option value="Finances">Finances</option>
                    <option value="Mathematics">Mathematics</option>
                    <option value="Transportation">Transportation</option>
                </select>

                <button onclick="resetFilters()">Reset Filters</button>
            </div>

            <div class="letter-navigation" id="letterNavigation">
                <!-- Letter buttons will be generated here -->
            </div>
        </div>

        <div id="lettersContainer">
            <!-- Letter sections will be generated here -->
        </div>

        <footer>
            <p>&copy; 2026 Lithuanian Language Learning | PolPolyLingo</p>
        </footer>
    </div>

    <script>
        const vocabularyData = {
            "A": [
                {
                    lithuanian: "Atsargus",
                    type: "adjective",
                    description: "You don't look bad by being cautious.",
                    imageUrl: "adjectives/ATSARGUS.png",
                    category: "Descriptive"
                },
                {
                    lithuanian: "Automašina",
                    type: "noun",
                    description: "Before a flying saucer there was a car.",
                    imageUrl: "transportation/AUTOMAŠINA.png",
                    category: "Transportation"
                }
            ],
            "F": [

                {
                    lithuanian: "Ferma",
                    type: "noun",
                    description: "When You hard-work at a Farm, but want to be at McDonald's for a while.",
                    imageUrl: "agriculture/FERMA.png",
                    category: "Agriculture"
                }
            ],
            "G": [
                {
                    lithuanian: "Gugolas",
                    type: "noun",
                    description: "Total number of unique ways to choose an unordered subset of 55 items from a larger set of 1431 items in combinatorics is the closest to a natural large number of a Googol.",
                    imageUrl: "mathematics/GUGOLAS.png",
                    category: "Mathematics"
                }
            ],
            "K": [
                {
                    lithuanian: "Kenkėjiškas programinis kodas",
                    type: "noun",
                    description: "Who gonna get a Reaper for a New Creeper (Computer Malware)?",
                    imageUrl: "computers/KENKĖJIŠKAS_PROGRAMINIS_KODAS.png",
                    category: "Computers"
                }
            ],
            "L": [
                {
                    lithuanian: "Linija",
                    type: "noun",
                    description: "When You got a problem in drawing a line because of small paper' size, then You could only to call for a ninja to get an extra half.",
                    imageUrl: "mathematics/LINIJA.png",
                    category: "Mathematics"
                }
            ],
            "S": [
                {
                    lithuanian: "Skola",
                    type: "noun",
                    description: "When You don't have money for scholarship, but You go for another drink of Cola.",
                    imageUrl: "finances/SKOLA.png",
                    category: "Finances"
                }
            ],
            "T": [
                {
                    lithuanian: "Televizorius",
                    type: "noun",
                    description: "If You gonna purchase a TV, then all You need is MTV & no extras.",
                    imageUrl: "communications/TELEVIZORIUS.png",
                    category: "Communications"
                },
                {
                    lithuanian: "Trolis",
                    type: "noun",
                    description: "If You gonna use a foul language, then You mouth could be targeted by script cleaners to tidy things up.",
                    imageUrl: "communications/TROLIS.png",
                    category: "Communications"
                }
            ]
        };

        let currentLetter = null;

        function initializePage() {
            generateLetterNavigation();
            generateLetterSections();
            selectLetter(Object.keys(vocabularyData)[0]);
            setupEventListeners();
        }

        function generateLetterNavigation() {
            const nav = document.getElementById("letterNavigation");
            const letters = Object.keys(vocabularyData).sort();
            
            nav.innerHTML = letters.map(letter => `
                <button class="letter-btn" onclick="selectLetter('${letter}')">${letter}</button>
            `).join("");
        }

        function generateLetterSections() {
            const container = document.getElementById("lettersContainer");
            const letters = Object.keys(vocabularyData).sort();
            
            container.innerHTML = letters.map(letter => `
                <div class="letter-section" id="section-${letter}">
                    <div class="letter-header">
                        <div class="letter-title">${letter}</div>
                        <div class="word-count">${vocabularyData[letter].length} words</div>
                    </div>
                    <div class="vocabulary-grid" id="grid-${letter}">
                        <!-- Stuff gonna be here -->
                    </div>
                </div>
            `).join("");
        }

        function selectLetter(letter) {
            currentLetter = letter;

            document.querySelectorAll(".letter-btn").forEach(btn => {
                btn.classList.remove("active");
            });
            event?.target?.classList.add("active");
            
            const buttons = document.querySelectorAll(".letter-btn");
            buttons.forEach(btn => {
                if (btn.textContent.trim() === letter) {
                    btn.classList.add("active");
                }
            });

            document.querySelectorAll(".letter-section").forEach(section => {
                section.classList.remove("active");
            });

            const section = document.getElementById(`section-${letter}`);
            section.classList.add("active");

            displayVocabularyForLetter(letter);
        }

        function displayVocabularyForLetter(letter) {
            const grid = document.getElementById(`grid-${letter}`);
            let wordsToDisplay = vocabularyData[letter];

            const categoryFilter = document.getElementById("categoryFilter").value;

            wordsToDisplay = wordsToDisplay.filter(item => {
                const matchesCategory = !categoryFilter || item.category === categoryFilter;

                return matchesCategory;
            });

            if (wordsToDisplay.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <p>No vocabulary items found for letter ${letter}.</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = wordsToDisplay.map((item, index) => `
                <div class="vocabulary-card">
                    <div class="card-image">
                        ${item.imageUrl ? `<img src="${item.imageUrl}" alt="${item.lithuanian}">` : '<span class="no-image">📷</span>'}
                    </div>
                    <div class="card-content">
                        <div class="word-lithuanian">${item.lithuanian}</div>
                        <div class="word-type">${item.type}</div>
                        <div class="word-description">${item.description}</div>
                        <div class="tags">
                            <span class="tag">${item.category}</span>
                        </div>
                    </div>
                </div>
            `).join("");
        }

        function setupEventListeners() {
            document.getElementById("categoryFilter").addEventListener("change", () => {
                if (currentLetter) {
                    displayVocabularyForLetter(currentLetter);
                }
            });
        }

        function resetFilters() {
            document.getElementById("categoryFilter").value = "";
            if (currentLetter) {
                displayVocabularyForLetter(currentLetter);
            }
        }

        window.addEventListener("DOMContentLoaded", initializePage);
    </script>
</body>
</html>
